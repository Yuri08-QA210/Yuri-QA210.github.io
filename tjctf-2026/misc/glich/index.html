<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuri08 - TJCTF 2026: Glitch</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --main: #7c3aed; --main2: #10b981; --main-light: #a78bfa;
      --bg: #0f0f1a; --bg2: #181a2a; --glass: rgba(30, 25, 60, 0.9);
      --text: #e0e7ef; --shadow: 0 8px 32px 0 #7c3aed33;
      --glow: 0 0 20px 2px #7c3aed44; --highlight: #38bdf8;
    }
    html, body {
      min-height: 100%; margin: 0; font-family: 'JetBrains Mono', monospace;
      background: radial-gradient(circle at 50% 0%, #1a1a3a 0%, #0f0f1a 100%);
      color: var(--text); overflow: hidden; perspective: 1000px;
    }
    #particles-js {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
    }
    .content-wrapper {
      position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column;
      padding: 20px; box-sizing: border-box; gap: 15px;
    }
    
    .header {
      display: flex; align-items: center; gap: 20px; padding: 15px;
      background: var(--glass); border-radius: 1rem; border: 1px solid #7c3aed44;
      box-shadow: var(--shadow); backdrop-filter: blur(10px); flex-shrink: 0;
    }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--main);
      object-fit: cover; box-shadow: 0 0 15px var(--main);
    }
    .header-info h1 {
      font-size: 1.8rem; margin: 0; color: var(--main);
      text-shadow: 0 0 10px #7c3aed88; animation: neonPurple 2s infinite alternate;
    }
    .header-info p { margin: 5px 0 0 0; color: var(--main-light); font-size: 0.9rem; }
    @keyframes neonPurple { to { text-shadow: 0 0 15px var(--main), 0 0 30px var(--main); } }
    
    .lang-toggle {
      margin-left: auto; background: var(--main); color: white; border: none;
      padding: 8px 15px; border-radius: 0.5rem; cursor: pointer; font-family: inherit;
      font-weight: bold; transition: 0.3s; box-shadow: 0 0 10px #7c3aed55;
    }
    .lang-toggle:hover { background: var(--main-light); transform: scale(1.05); }

    .terminal-pro {
      background: linear-gradient(135deg, #12121f 80%, #7c3aed11 100%);
      border-radius: 1rem; border: 1px solid #312e8155; box-shadow: var(--shadow), var(--glow);
      display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; position: relative;
    }
    .terminal-pro::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
      pointer-events: none; z-index: 2; opacity: 0.2;
    }
    .terminal-bar {
      background: #1e1e2e; height: 2.5rem; display: flex; align-items: center;
      padding: 0 1rem; border-bottom: 1px solid #312e8155; flex-shrink: 0; z-index: 3;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; }
    .red { background: #ef4444; } .yellow { background: #facc15; } .green { background: #22c55e; }
    .terminal-title { color: var(--main-light); margin-left: 1rem; font-weight: bold; letter-spacing: 1px; }
    
    .terminal-body {
      padding: 1.5rem; flex-grow: 1; overflow-y: auto; font-size: 0.95rem;
      line-height: 1.6; position: relative; z-index: 1; scroll-behavior: smooth;
    }
    #terminal-output { white-space: pre-wrap; word-break: break-word; }
    #terminal-input-line {
      display: flex; align-items: center; gap: 0.5em; margin-top: 1em; z-index: 3;
    }
    #terminal-input {
      background: transparent; border: none; color: #a7f3d0; outline: none;
      font-family: inherit; font-size: 1em; width: 100%; caret-color: var(--main);
    }
    
    .cmd { color: #7c3aed; } .arg { color: #a78bfa; } .info { color: #38bdf8; font-weight: bold; }
    .error { color: #ef4444; } .success { color: #10b981; } .warning { color: #facc15; }
    .code-block {
      background: #0d0d1a; border-left: 3px solid var(--main); padding: 10px 15px;
      margin: 10px 0; border-radius: 0 5px 5px 0; font-size: 0.9rem; color: #d1d5db;
    }
    
    .terminal-body::-webkit-scrollbar { width: 8px; }
    .terminal-body::-webkit-scrollbar-track { background: #0f0f1a; }
    .terminal-body::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 4px; }

    #welcome-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #0f0f1a; z-index: 10000; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center; transition: opacity 0.8s;
    }
    #welcome-screen.hidden { opacity: 0; pointer-events: none; }
    #start-button {
      background: var(--main); color: white; border: none; border-radius: 0.7rem;
      padding: 1rem 2rem; font-size: 1.2rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all 0.3s; box-shadow: 0 0 20px #7c3aed88;
    }
    #start-button:hover { background: var(--main-light); transform: translateY(-3px); }
    
    #mute-button {
      position: fixed; top: 20px; right: 20px; z-index: 10001;
      background: #1e1e2e; color: var(--main-light); border: 1px solid #7c3aed55;
      border-radius: 50%; width: 40px; height: 40px; font-size: 1.2rem; cursor: pointer;
      display: flex; justify-content: center; align-items: center; transition: all 0.3s;
    }
    #mute-button:hover { background: var(--main); color: white; }

    @media (max-width: 768px) {
      .header { flex-wrap: wrap; justify-content: center; text-align: center; }
      .lang-toggle { margin-left: 0; margin-top: 10px; width: 100%; }
      .avatar { width: 60px; height: 60px; }
      .header-info h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div id="welcome-screen">
    <h1 style="color: var(--main); text-shadow: 0 0 20px var(--main); margin-bottom: 20px;">Yuri08 CTF Terminal</h1>
    <p style="color: #c4b5fd; margin-bottom: 30px;">TJCTF 2026 - Misc / Glitch</p>
    <button id="start-button">Khởi tạo Terminal</button>
  </div>

  <button id="mute-button" aria-label="Toggle Sound"><i class="bi bi-volume-up-fill"></i></button>
  <div id="particles-js"></div>

  <div class="content-wrapper">
    <header class="header">
      <img src="https://files.catbox.moe/755fgv.png" alt="Avatar" class="avatar" />
      <div class="header-info">
        <h1>Yuri08</h1>
        <p>Steganographer | Visual Crypto Analyst</p>
      </div>
      <button class="lang-toggle" id="lang-btn" onclick="toggleLang()">Switch to English</button>
    </header>

    <section class="terminal-pro">
      <div class="terminal-bar">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="terminal-title">root@tjctf:~/glitch#</span>
      </div>
      <div class="terminal-body" id="terminal-body">
        <pre id="terminal-output"></pre>
        <div id="terminal-input-line">
          <span class="cmd">root@tjctf</span>:<span class="arg">~/glitch</span>$           <input type="text" id="terminal-input" autocomplete="off" spellcheck="false" />
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    let isMuted = false;
    let currentLang = 'vi';
    let userInteracted = false;
    const output = document.getElementById('terminal-output');
    const input = document.getElementById('terminal-input');
    const tBody = document.getElementById('terminal-body');

    particlesJS.load('particles-js', 'https://cdn.jsdelivr.net/gh/VincentGarreau/particles.js/particles.json');

    function playAudio(src, vol=0.2) {
      if (!userInteracted || isMuted || !src) return;
      try { const a = new Audio(src); a.volume = vol; a.play(); } catch(e) {}
    }

    document.getElementById('mute-button').addEventListener('click', function() {
      isMuted = !isMuted;
      this.querySelector('i').className = isMuted ? 'bi bi-volume-mute-fill' : 'bi bi-volume-up-fill';
    });

    function print(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      output.appendChild(div);
      tBody.scrollTop = tBody.scrollHeight;
    }

    // --- TRANSLATIONS & DETAILED WRITEUP DATA ---
    const L = {
      vi: {
        help: `<span class="info">[ Hướng Dẫn Đọc Writeup ]</span>
<span class="cmd">intro</span>       : Tổng quan Challenge & Hiện tượng Glitch
<span class="cmd">signal</span>      : Tách tín hiệu khỏi nhiễu (Noise vs. Bands)
<span class="cmd">resistor</span>    : Ánh xạ Mã màu Điện trở (Resistor Code)
<span class="cmd">decode</span>      : Quy trình Giải mã ASCII từng cặp
<span class="cmd">code</span>        : Source Code Khai thác (Python)
<span class="cmd">clear</span>       : Xóa màn hình Terminal`,
        intro: `<span class="info">[ TỔNG QUAN: GLITCH ]</span>
<span class="cmd">Category:</span> Steganography / Visual Cryptography
<span class="cmd">Flag:</span> <span class="success">tjctf{D3S1GN+TECH_:)}</span>

<span class="warning">Mô tả:</span> "Do not resist the g̵͕̗͑̅l̶̢̂̚ḭ̶̐͗t̴͔̞̒͐c̸̭͈̄h̷̨̞͊͠." (Đừng chống lại lỗi glitch)

<span class="cmd">Objective:</span> Khôi phục thông điệp ẩn từ bức ảnh bị nhiễu glitch và bọc nó trong tjctf{}.
<span class="cmd">File cung cấp:</span> glitch.png - Một bức ảnh trông như màn hình TV bị hỏng, đầy nhiễu và các dải màu ngang.`,
        signal: `<span class="info">[ TÁCH TÍN HIỆU KHỎI NHIỄU ]</span>
Khi mở glitch.png, bạn sẽ thấy hàng tá các dải màu ngang xen kẽ "nhiễu" pixel. Phản ứng đầu tiên là dùng tool lọc nhiễu, nhưng điều đó không ra flag.

<span class="warning">Quan sát trọng tâm:</span> Hãy bỏ qua các dải nhiễu nhấp nháy, tập trung vào các <span class="cmd">dải màu đặc (color bands)</span> dày và đồng nhất trải ngang ảnh. Chúng hiện diện một cách có chủ ý.

Khi downsample hoặc làm mờ ảnh nhẹ, bạn sẽ nhận ra các dải màu này xếp theo một thứ tự từ trên xuống dưới. Đó chính là "tín hiệu" chứa dữ liệu ẩn.`,
        resistor: `<span class="info">[ MÃ MÀU ĐIỆN TRỞ (RESISTOR COLOR CODE) ]</span>
Gợi ý lớn nhất nằm ở chữ "resist" trong mô tả (resistor - điện trở). Trong điện tử, điện trở được đánh giá bằng các vành màu:

<span class="cmd">0:</span> Black  | <span class="cmd">1:</span> Brown   | <span class="cmd">2:</span> Red     | <span class="cmd">3:</span> Orange
<span class="cmd">4:</span> Yellow | <span class="cmd">5:</span> Green   | <span class="cmd">6:</span> Blue    | <span class="cmd">7:</span> Violet
<span class="cmd">8:</span> Gray   | <span class="cmd">9:</span> White

Trong mã điện trở, 2 vành đầu tiên tạo thành một số 2 chữ số.
Ví dụ: Vành Xanh dương (6) và Vàng (4) tạo thành số <span class="arg">64</span>.`,
        decode: `<span class="info">[ QUY TRÌNH GIẢI MÃ ASCII ]</span>
Bức ảnh sắp xếp các dải màu theo CẶP (pair). Mỗi cặp 2 màu tạo thành một số 2 chữ số, và số đó chính là mã ASCII thập phân của một ký tự!

Ví dụ cặp đầu tiên:
1. Dải <span class="cmd">Blue (6)</span> tiếp giáp dải <span class="cmd">Gray (8)</span> -> Số 68
2. Tra bảng ASCII: 68 = <span class="success">'D'</span>

Ví dụ cặp thứ hai:
1. Dải <span class="cmd">Green (5)</span> tiếp giáp dải <span class="cmd">Brown (1)</span> -> Số 51
2. Tra bảng ASCII: 51 = <span class="success">'3'</span>

Tiếp tục đọc các cặp màu từ trên xuống dưới, ta thu được chuỗi: <span class="success">D3S1GN+TECH_:)</span>
Bọc trong tjctf{} ta có flag!`,
        code: `<span class="info">[ EXPLOIT SOURCE CODE ]</span>
<div class="code-block">#!/usr/bin/env python3

# Bảng ánh xạ màu điện trở sang chữ số
COLOR_TO_DIGIT = {
    "black": "0", "brown": "1", "red": "2", "orange": "3",
    "yellow": "4", "green": "5", "blue": "6", "violet": "7",
    "gray": "8", "white": "9"
}

# Dữ liệu trích xuất từ các dải màu trong ảnh (từ trên xuống dưới)
BAND_PAIRS = [
    ("blue", "gray"),      # 68 -> D
    ("green", "brown"),    # 51 -> 3
    ("gray", "orange"),    # 83 -> S
    ("yellow", "white"),   # 49 -> 1
    ("violet", "brown"),   # 71 -> G
    ("violet", "gray"),    # 78 -> N
    ("yellow", "orange"),  # 43 -> +
    ("gray", "yellow"),    # 84 -> T
    ("blue", "white"),     # 69 -> E
    ("blue", "violet"),    # 67 -> C
    ("violet", "red"),     # 72 -> H
    ("white", "green"),    # 95 -> _
    ("green", "gray"),     # 58 -> :
    ("yellow", "brown"),   # 41 -> )
]

def decode_bands(pairs):
    message_chars = []
    for color_a, color_b in pairs:
        digit_str = COLOR_TO_DIGIT[color_a] + COLOR_TO_DIGIT[color_b]
        ascii_val = int(digit_str)
        message_chars.append(chr(ascii_val))
    return "".join(message_chars)

if __name__ == "__main__":
    hidden_text = decode_bands(BAND_PAIRS)
    print(f"Decoded Text: {hidden_text}")
    print(f"Flag: tjctf{{{hidden_text}}}")</div>`
      },
      en: {
        help: `<span class="info">[ WRITEUP NAVIGATION ]</span>
<span class="cmd">intro</span>       : Challenge Overview & The Glitch Phenomenon
<span class="cmd">signal</span>      : Separating Signal from Noise (Bands)
<span class="cmd">resistor</span>    : Mapping to Resistor Color Code
<span class="cmd">decode</span>      : ASCII Decoding Process per Pair
<span class="cmd">code</span>        : Exploit Source Code (Python)
<span class="cmd">clear</span>       : Clear Terminal Screen`,
        intro: `<span class="info">[ OVERVIEW: GLITCH ]</span>
<span class="cmd">Category:</span> Steganography / Visual Cryptography
<span class="cmd">Flag:</span> <span class="success">tjctf{D3S1GN+TECH_:)}</span>

<span class="warning">Description:</span> "Do not resist the g̵͕̗͑̅l̶̢̂̚ḭ̶̐͗t̴͔̞̒͐c̸̭͈̄h̷̨̞͊͠."

<span class="cmd">Objective:</span> Recover the hidden message from the glitched image and wrap it in tjctf{}.
<span class="cmd">File Provided:</span> glitch.png - An image that looks like a broken TV screen, full of noise and horizontal color bands.`,
        signal: `<span class="info">[ SEPARATING SIGNAL FROM NOISE ]</span>
When opening glitch.png, you see tons of horizontal color bands mixed with noisy pixels. The first instinct is to use noise-filtering tools, but that doesn't yield the flag.

<span class="warning">Key Observation:</span> Ignore the flickering noise lines and focus on the thick, solid <span class="cmd">color bands</span> spanning horizontally. They are placed intentionally.

When downsampling or slightly blurring the image, you realize these bands are ordered from top to bottom. This is the "signal" containing the hidden data.`,
        resistor: `<span class="info">[ RESISTOR COLOR CODE MAPPING ]</span>
The biggest hint is the word "resist" in the description (resistor). In electronics, resistor values are represented by color bands:

<span class="cmd">0:</span> Black  | <span class="cmd">1:</span> Brown   | <span class="cmd">2:</span> Red     | <span class="cmd">3:</span> Orange
<span class="cmd">4:</span> Yellow | <span class="cmd">5:</span> Green   | <span class="cmd">6:</span> Blue    | <span class="cmd">7:</span> Violet
<span class="cmd">8:</span> Gray   | <span class="cmd">9:</span> White

In resistor codes, the first 2 bands form a 2-digit number.
Example: Blue (6) and Yellow (4) bands form the number <span class="arg">64</span>.`,
        decode: `<span class="info">[ ASCII DECODING PROCESS ]</span>
The image arranges color bands in PAIRS. Each pair of 2 colors forms a 2-digit number, which is the decimal ASCII code of a character!

Example of the first pair:
1. <span class="cmd">Blue (6)</span> band next to <span class="cmd">Gray (8)</span> -> Number 68
2. ASCII lookup: 68 = <span class="success">'D'</span>

Example of the second pair:
1. <span class="cmd">Green (5)</span> band next to <span class="cmd">Brown (1)</span> -> Number 51
2. ASCII lookup: 51 = <span class="success">'3'</span>

Continuing to read color pairs from top to bottom, we get the string: <span class="success">D3S1GN+TECH_:)</span>
Wrapping it in tjctf{} gives the flag!`,
        code: `<span class="info">[ EXPLOIT SOURCE CODE ]</span>
<div class="code-block">#!/usr/bin/env python3

# Mapping resistor colors to digits
COLOR_TO_DIGIT = {
    "black": "0", "brown": "1", "red": "2", "orange": "3",
    "yellow": "4", "green": "5", "blue": "6", "violet": "7",
    "gray": "8", "white": "9"
}

# Data extracted from the image color bands (top to bottom)
BAND_PAIRS = [
    ("blue", "gray"),      # 68 -> D
    ("green", "brown"),    # 51 -> 3
    ("gray", "orange"),    # 83 -> S
    ("yellow", "white"),   # 49 -> 1
    ("violet", "brown"),   # 71 -> G
    ("violet", "gray"),    # 78 -> N
    ("yellow", "orange"),  # 43 -> +
    ("gray", "yellow"),    # 84 -> T
    ("blue", "white"),     # 69 -> E
    ("blue", "violet"),    # 67 -> C
    ("violet", "red"),     # 72 -> H
    ("white", "green"),    # 95 -> _
    ("green", "gray"),     # 58 -> :
    ("yellow", "brown"),   # 41 -> )
]

def decode_bands(pairs):
    message_chars = []
    for color_a, color_b in pairs:
        digit_str = COLOR_TO_DIGIT[color_a] + COLOR_TO_DIGIT[color_b]
        ascii_val = int(digit_str)
        message_chars.append(chr(ascii_val))
    return "".join(message_chars)

if __name__ == "__main__":
    hidden_text = decode_bands(BAND_PAIRS)
    print(f"Decoded Text: {hidden_text}")
    print(f"Flag: tjctf{{{hidden_text}}}")</div>`
      }
    };

    function toggleLang() {
      currentLang = currentLang === 'vi' ? 'en' : 'vi';
      const btn = document.getElementById('lang-btn');
      btn.textContent = currentLang === 'vi' ? 'Switch to English' : 'Chuyển sang Tiếng Việt';
      handleCommand('clear');
      handleCommand('help');
      playAudio('https://www.soundjay.com/buttons/button-1.mp3', 0.3);
    }

    const cmds = {
      help: () => L[currentLang].help,
      intro: () => L[currentLang].intro,
      signal: () => L[currentLang].signal,
      resistor: () => L[currentLang].resistor,
      decode: () => L[currentLang].decode,
      code: () => L[currentLang].code,
      clear: () => { output.innerHTML = ''; return ''; },
      banner: () => `<span class="info">
   _____ _     _     _           
  / ____| |   (_)   | |          
 | |  __| |__  _  __| | ___ _ __ 
 | | |_ | '_ \\| |/ _\` |/ _ \\ '__|
 | |__| | | | | | (_| |  __/ |   
  \\_____|_| |_|_|\\__,_|\\___|_|</span>`
    };

    function handleCommand(cmd) {
      const c = cmd.trim().toLowerCase();
      if(!c) return;
      print(`<span class="cmd">root@tjctf</span>:<span class="arg">~/glitch</span>$ ${cmd}`);
      playAudio('https://www.soundjay.com/buttons/button-5.mp3', 0.15);
      
      if (cmds[c]) {
        const res = cmds[c]();
        if (res) print(res);
      } else {
        print(`<span class="error">Command not found: ${c}. Type 'help' for navigation.</span>`);
      }
      input.value = '';
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); handleCommand(input.value); }
      else playAudio('https://www.soundjay.com/buttons/button-8.mp3', 0.02);
    });

    tBody.addEventListener('click', () => input.focus());

    document.getElementById('start-button').addEventListener('click', () => {
      userInteracted = true;
      const ws = document.getElementById('welcome-screen');
      ws.classList.add('hidden');
      setTimeout(() => { handleCommand('banner'); handleCommand('help'); input.focus(); }, 800);
      playAudio('https://www.soundjay.com/buttons/button-10.mp3', 0.4);
    });
  </script>
</body>
</html>
