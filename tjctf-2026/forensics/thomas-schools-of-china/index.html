    });

    document.getElementById('start-button').addEventListener('click', () => {
      userInteracted = true;
      const ws = document.getElementById('welcome-screen');
      ws.classList.add('hidden');
      setTimeout(() => { handleCommand('banner'); handleCommand('help'); input.focus(); }, 800);
      playAudio('https://www.soundjay.com/buttons/button-10.mp3', 0.4);
    });
  </script>
</body>
</html>
